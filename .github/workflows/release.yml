name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake nasm mtools dosfstools \
                               qemu-system-x86 ovmf git clang lld xorriso python3

      - name: Configure CMake
        run: CC=clang LD=lld cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Create boot images
        run: |
          chmod +x tools/make-iso.sh tools/create-disk-img.py
          ./tools/make-iso.sh
          python3 tools/create-disk-img.py build/sys/kernel/kernel.efi build/brights-disk.img

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/sys/kernel/kernel.efi
            build/brights.iso
            build/brights-efi.img
            build/brights-disk.img
            build/tests/test_ramfs
            build/tests/test_benchmark
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
