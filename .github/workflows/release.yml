name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake nasm mtools dosfstools \
                               qemu-system-x86 ovmf git clang lld xorriso python3

      # --- x86_64 (UEFI) ---
      - name: Configure CMake (x86_64)
        run: CC=clang LD=lld cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (x86_64)
        run: cmake --build build -j$(nproc)

      - name: Create x86_64 ISO
        run: |
          chmod +x tools/make-iso.sh
          ./tools/make-iso.sh

      # --- i386 ---
      - name: Build (i386)
        run: bash scripts/build-i386.sh

      - name: Create i386 ISO
        run: |
          mkdir -p build/i386-iso
          cp build/floppy.img build/i386-iso/
          xorriso -as mkisofs \
            -b floppy.img \
            -no-emul-boot \
            -V "BRIGHTS_I386" \
            -o build/brights-i386.iso \
            build/i386-iso/

      # --- Release ---
      - name: Rename artifacts with version tag
        run: |
          TAG="${{ github.ref_name }}"
          cp build/brights.iso "build/BrightS-${TAG}-x86_64.iso"
          cp build/brights-i386.iso "build/BrightS-${TAG}-i386.iso"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/BrightS-*.iso
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
