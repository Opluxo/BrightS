name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  x86_64:
    name: x86_64 (UEFI)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake nasm mtools dosfstools \
                               qemu-system-x86 ovmf git clang lld xorriso python3

      - name: Configure CMake
        run: CC=clang LD=lld cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Create ISO
        run: |
          chmod +x tools/make-iso.sh
          ./tools/make-iso.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brights-x86_64
          path: build/brights.iso

  i386:
    name: i386
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential nasm mtools dosfstools xorriso python3

      - name: Build
        run: bash scripts/build-i386.sh

      - name: Create ISO
        run: |
          mkdir -p build/i386-iso
          cp build/floppy.img build/i386-iso/
          xorriso -as mkisofs \
            -b floppy.img \
            -no-emul-boot \
            -V "BRIGHTS_I386" \
            -o build/brights-i386.iso \
            build/i386-iso/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brights-i386
          path: build/brights-i386.iso
